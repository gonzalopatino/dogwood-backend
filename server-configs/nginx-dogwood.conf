# /etc/nginx/sites-available/dogwood
#
# What this does:
# - Listens on port 80 (HTTP)
# - Redirects all HTTP traffic to HTTPS
# - Listens on port 443 (HTTPS) with your SSL certificate
# - Passes all requests to Django (running on port 8000 via Gunicorn)

# Redirect HTTP → HTTPS
server {
    listen 80;
    server_name your-domain.com www.your-domain.com;
    return 301 https://$host$request_uri;
}

# HTTPS server
server {
    listen 443 ssl;
    server_name your-domain.com www.your-domain.com;

    # SSL certificates (Let's Encrypt will put them here)
    ssl_certificate     /etc/letsencrypt/live/your-domain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/your-domain.com/privkey.pem;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Max upload size (matches our 10 MB file upload limit)
    client_max_body_size 10M;

    # Pass everything to Gunicorn (Django)
    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
